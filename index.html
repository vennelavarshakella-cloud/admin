<!DOCTYPE html>
<html>
<head>
    <title>My E-Commerce Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 30px;
            flex-wrap: wrap;
        }

        .product {
            background: white;
            border: 1px solid #ddd;
            padding: 15px;
            text-align: center;
            width: 220px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .product img {
            width: 150px;
            height: 150px;
        }

        button {
            background-color: green;
            color: white;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>

    <header>
        <h1>My E-Commerce Store</h1>
    </header>

    <div class="container">

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Mobile">
            <h2>Mobile Phone</h2>
            <p>Price: ₹15,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Laptop">
            <h2>Laptop</h2>
            <p>Price: ₹50,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/150" alt="Headphones">
            <h2>Headphones</h2>
            <p>Price: ₹1,500</p>
            <button>Add to Cart</button>
        </div>

    </div>

</body>
</html>
